<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guardian Sport Q&A</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(145deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 50%, rgba(72, 49, 212, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(120, 119, 198, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 50% 80%, rgba(0, 200, 255, 0.05) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 32px;
            padding: 50px 45px;
            max-width: 720px;
            width: 100%;
            box-shadow: 
                0 25px 50px -12px rgba(0, 0, 0, 0.8),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
            position: relative;
            z-index: 1;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .container.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            margin-bottom: 20px;
            font-size: 32px;
            color: white;
            box-shadow: 0 8px 32px rgba(102, 126, 234, 0.3);
            transition: transform 0.3s ease;
        }

        .header-icon:hover {
            transform: scale(1.05) rotate(-5deg);
        }

        h2 {
            color: #ffffff;
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
            font-weight: 400;
            letter-spacing: 0.3px;
        }

        .subtitle i {
            margin-right: 6px;
            color: #667eea;
        }

        .badge {
            display: inline-block;
            background: rgba(102, 126, 234, 0.15);
            color: #a8b5ff;
            font-size: 11px;
            font-weight: 600;
            padding: 4px 14px;
            border-radius: 50px;
            border: 1px solid rgba(102, 126, 234, 0.2);
            margin-top: 10px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            border: 1.5px solid rgba(255, 255, 255, 0.08);
            transition: all 0.3s ease;
            overflow: hidden;
        }

        .input-wrapper:focus-within {
            border-color: #667eea;
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        .input-wrapper i {
            color: rgba(255, 255, 255, 0.3);
            padding: 0 0 0 18px;
            font-size: 16px;
            transition: color 0.3s ease;
        }

        .input-wrapper:focus-within i {
            color: #667eea;
        }

        input[type="text"] {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: #ffffff;
            font-size: 16px;
            font-weight: 400;
            padding: 18px 16px;
            font-family: 'Inter', sans-serif;
            min-width: 0;
        }

        input[type="text"]::placeholder {
            color: rgba(255, 255, 255, 0.3);
            font-weight: 300;
        }

        button[type="submit"] {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            padding: 12px 28px;
            margin: 4px;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            gap: 10px;
            white-space: nowrap;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        button[type="submit"]:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }

        button[type="submit"]:active {
            transform: scale(0.98);
        }

        button[type="submit"] i {
            font-size: 14px;
        }

        .answer-section {
            margin-top: 40px;
            padding-top: 30px;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
        }

        .answer-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .answer-header i {
            color: #667eea;
            font-size: 20px;
            background: rgba(102, 126, 234, 0.1);
            padding: 8px;
            border-radius: 12px;
        }

        h3 {
            color: rgba(255, 255, 255, 0.6);
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin: 0;
        }

        .answer-box {
            background: rgba(255, 255, 255, 0.04);
            border-radius: 16px;
            padding: 24px 28px;
            min-height: 80px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
            position: relative;
        }

        .answer-box.has-content {
            border-color: rgba(102, 126, 234, 0.15);
            background: rgba(102, 126, 234, 0.04);
        }

        .answer-box p {
            color: rgba(255, 255, 255, 0.85);
            font-size: 15px;
            line-height: 1.8;
            font-weight: 300;
            margin: 0;
        }

        .answer-box .empty-state {
            color: rgba(255, 255, 255, 0.2);
            font-size: 14px;
            font-weight: 300;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            min-height: 50px;
        }

        .answer-box .empty-state i {
            font-size: 18px;
            opacity: 0.5;
        }

        .loading {
            display: none;
            color: rgba(255, 255, 255, 0.3);
            font-size: 14px;
            align-items: center;
            justify-content: center;
            gap: 12px;
            min-height: 50px;
        }

        .loading.active {
            display: flex;
        }

        .loading i {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 600px) {
            .container {
                padding: 30px 20px;
                border-radius: 24px;
            }

            h2 {
                font-size: 22px;
            }

            .input-wrapper {
                flex-direction: column;
                align-items: stretch;
                background: transparent;
                border: none;
                gap: 12px;
            }

            .input-wrapper i {
                display: none;
            }

            input[type="text"] {
                background: rgba(255, 255, 255, 0.06);
                border-radius: 16px;
                border: 1.5px solid rgba(255, 255, 255, 0.08);
                padding: 16px 18px;
                font-size: 15px;
            }

            input[type="text"]:focus {
                border-color: #667eea;
                background: rgba(255, 255, 255, 0.08);
            }

            button[type="submit"] {
                justify-content: center;
                padding: 16px 28px;
                margin: 0;
                border-radius: 16px;
                font-size: 16px;
            }

            .answer-box {
                padding: 18px 20px;
            }

            .header-icon {
                width: 60px;
                height: 60px;
                font-size: 26px;
            }

            .badge {
                font-size: 10px;
            }
        }

        @media (max-width: 400px) {
            .container {
                padding: 24px 16px;
            }

            h2 {
                font-size: 20px;
            }

            .answer-box p {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>

<div class="container" id="mainContainer">
    
    <div class="header">
        <div class="header-icon">
            <i class="fas fa-newspaper"></i>
        </div>
        <h2>Guardian Sport</h2>
        <h3>Got a question about today's sports headlines? Just ask.I've got the latest Guardian data ready.</h3>
        <span class="badge">
            <i class="fas fa-brain"></i> Sport
        </span>
    </div>

    <form method="POST" class="form-group" id="questionForm">
        <div class="input-wrapper">
            <i class="fas fa-question-circle"></i>
            <input 
                type="text" 
                name="question" 
                id="questionInput"
                placeholder="Ask something about AI news..." 
                required
                autocomplete="off"
            >
            <button type="submit">
                <i class="fas fa-paper-plane"></i> Ask
            </button>
        </div>
    </form>

    <div class="answer-section">
        <div class="answer-header">
            <i class="fas fa-lightbulb"></i>
            <h3>AI Response</h3>
        </div>
        <div class="answer-box" id="answerBox">
            <!-- Empty State (shown by default) -->
            <div class="empty-state" id="emptyState">
                <i class="fas fa-message"></i>
                <span>Your answer will appear here</span>
            </div>
            
            <!-- Loading State -->
            <div class="loading" id="loadingState">
                <i class="fas fa-spinner"></i>
                <span>Thinking...</span>
            </div>
            
            <!-- Answer Content (hidden by default) -->
            <p id="answerContent" style="display: none;"></p>
        </div>
    </div>

</div>

<script>
    // Show container with animation
    document.addEventListener('DOMContentLoaded', function() {
        const container = document.getElementById('mainContainer');
        setTimeout(() => {
            container.classList.add('visible');
        }, 100);
    });

    // Handle form submission
    document.getElementById('questionForm').addEventListener('submit', function(e) {
        e.preventDefault(); // Prevent actual form submission for demo
        
        const questionInput = document.getElementById('questionInput');
        const question = questionInput.value.trim();
        
        if (!question) return;
        
        // Get elements
        const emptyState = document.getElementById('emptyState');
        const loadingState = document.getElementById('loadingState');
        const answerContent = document.getElementById('answerContent');
        const answerBox = document.getElementById('answerBox');
        
        // Show loading, hide others
        emptyState.style.display = 'none';
        answerContent.style.display = 'none';
        loadingState.classList.add('active');
        answerBox.classList.remove('has-content');
        
        // Simulate AI response (replace this with your actual API call)
        fetch("/ask", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ question: question })
        })
        .then(response => response.json())
        .then(data => {
            loadingState.classList.remove('active');
            answerContent.textContent = data.answer;
            answerContent.style.display = 'block';
            answerBox.classList.add('has-content');
        })
        .catch(error => {
            console.error(error);
        
            
        }, 1500); // Simulate 1.5s processing time
    });

    // Optional: Allow Enter key to submit (already handled by form)
    // Optional: Clear answer when typing new question
    document.getElementById('questionInput').addEventListener('input', function() {
        const answerContent = document.getElementById('answerContent');
        const emptyState = document.getElementById('emptyState');
        const loadingState = document.getElementById('loadingState');
        const answerBox = document.getElementById('answerBox');
        
        // Only reset if there's content showing
        if (answerContent.style.display === 'block' || loadingState.classList.contains('active')) {
            loadingState.classList.remove('active');
            answerContent.style.display = 'none';
            emptyState.style.display = 'flex';
            answerBox.classList.remove('has-content');
        }
    });
</script>

</body>
</html>
